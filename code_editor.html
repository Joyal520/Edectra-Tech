<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EdTechra QuickRun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet">
  <style>
    /* ─── CSS Variables & Reset ─────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-0: #0d0f14;
      --bg-1: #13161e;
      --bg-2: #1a1e28;
      --bg-3: #222736;
      --border: #2a3045;
      --accent: #4af0a8;
      --accent-dim: #1a5c42;
      --warn: #f0a84a;
      --err: #f05a4a;
      --text-0: #e8ecf5;
      --text-1: #8b93a8;
      --text-2: #545e78;
      --tab-html: #e06c75;
      --tab-css: #56b6c2;
      --tab-js: #e5c07b;
      --radius: 6px;
      --header-h: 52px;
      --tab-h: 38px;
      --font-ui: 'Space Grotesk', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: var(--bg-0);
      color: var(--text-0);
      font-family: var(--font-ui);
    }

    /* ─── Header ─────────────────────────────────────────────── */
    #header {
      height: var(--header-h);
      background: var(--bg-1);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 7px;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
      overflow-x: auto;
    }

    #header::-webkit-scrollbar {
      display: none;
    }

    .logo {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.5px;
      margin-right: 4px;
      white-space: nowrap;
    }

    .logo span {
      color: var(--text-1);
      font-weight: 400;
    }

    .hdr-sep {
      width: 1px;
      height: 22px;
      background: var(--border);
      margin: 0 3px;
      flex-shrink: 0;
    }

    /* ─── Buttons ─────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 0 11px;
      height: 30px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-2);
      color: var(--text-0);
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, border-color .15s, color .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn:hover {
      background: var(--bg-3);
      border-color: #3a4560;
    }

    .btn.primary {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn.primary:hover {
      background: #22705050;
    }

    .btn.active {
      background: #1a3a2a;
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
    }

    #status {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg-2);
      color: var(--text-1);
      transition: all .2s;
      flex-shrink: 0;
    }

    #status.running {
      border-color: var(--warn);
      color: var(--warn);
    }

    #status.error {
      border-color: var(--err);
      color: var(--err);
    }

    #status.ok {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ─── Main Layout ─────────────────────────────────────────── */
    #app {
      display: flex;
      height: calc(100vh - var(--header-h));
    }

    /* ─── Left Panel ──────────────────────────────────────────── */
    #editor-panel {
      display: flex;
      flex-direction: column;
      width: 50%;
      min-width: 220px;
      border-right: 1px solid var(--border);
      background: var(--bg-1);
    }

    #tab-bar {
      display: flex;
      align-items: center;
      height: var(--tab-h);
      background: var(--bg-0);
      border-bottom: 1px solid var(--border);
      padding: 0 8px;
      gap: 2px;
      flex-shrink: 0;
    }

    .tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 12px;
      height: 26px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      font-family: var(--font-mono);
      cursor: pointer;
      border: 1px solid transparent;
      color: var(--text-1);
      transition: all .15s;
      letter-spacing: .5px;
    }

    .tab .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      opacity: .6;
    }

    .tab:hover {
      color: var(--text-0);
      background: var(--bg-2);
    }

    .tab.active {
      background: var(--bg-2);
      border-color: var(--border);
      color: var(--text-0);
    }

    .tab[data-lang="html"].active {
      color: var(--tab-html);
    }

    .tab[data-lang="html"] .dot {
      background: var(--tab-html);
    }

    .tab[data-lang="css"].active {
      color: var(--tab-css);
    }

    .tab[data-lang="css"] .dot {
      background: var(--tab-css);
    }

    .tab[data-lang="js"].active {
      color: var(--tab-js);
    }

    .tab[data-lang="js"] .dot {
      background: var(--tab-js);
    }

    .tab-actions {
      margin-left: auto;
      display: flex;
      gap: 4px;
    }

    #editor-container {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ─── Right Panel ─────────────────────────────────────────── */
    #preview-panel {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      background: var(--bg-0);
    }

    #preview-header {
      display: flex;
      align-items: center;
      height: var(--tab-h);
      padding: 0 10px;
      gap: 6px;
      background: var(--bg-0);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .preview-label {
      font-size: 11px;
      font-weight: 600;
      font-family: var(--font-mono);
      color: var(--text-2);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Viewport toggle group */
    .vp-group {
      display: flex;
      gap: 2px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px;
    }

    .vp-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 22px;
      border-radius: 4px;
      cursor: pointer;
      color: var(--text-2);
      transition: all .15s;
      border: 1px solid transparent;
    }

    .vp-btn:hover {
      color: var(--text-0);
      background: var(--bg-3);
    }

    .vp-btn.active {
      background: var(--bg-1);
      border-color: var(--border);
      color: var(--accent);
    }

    .vp-btn svg {
      width: 14px;
      height: 14px;
    }

    /* Preview wrap */
    #preview-wrap {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow: auto;
      background: var(--bg-0);
      position: relative;
      transition: background .2s;
    }

    #preview-wrap.device-mode {
      background: #080a0f;
      padding: 24px 0 16px;
    }

    #preview-wrap.device-mode #iframe-device-frame {
      display: flex;
    }

    #iframe-device-frame {
      display: none;
      flex-direction: column;
      align-items: center;
    }

    /* Device shell */
    .device-shell {
      background: #111;
      border-radius: 32px;
      border: 4px solid #2a3045;
      box-shadow: 0 40px 100px rgba(0, 0, 0, .8), 0 0 0 1px rgba(255, 255, 255, 0.05);
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
      transition: all .4s cubic-bezier(0.2, 0, 0, 1);
    }

    .device-shell.phone {
      width: 390px;
      border-radius: 44px;
    }

    .device-shell.tablet {
      width: 768px;
      border-radius: 20px;
    }

    .device-notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 30px;
      background: #1c1f2a;
      border-radius: 0 0 18px 18px;
      z-index: 2;
    }

    .device-shell.tablet .device-notch {
      display: none;
    }

    .device-shell iframe {
      display: block;
      border: none;
      background: transparent;
      width: 100%;
    }

    .device-shell.phone iframe {
      height: 740px;
    }

    .device-shell.tablet iframe {
      height: 1024px;
      max-height: 80vh;
    }

    /* Desktop iframe */
    #preview-iframe-desktop {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      display: block;
    }

    /* Device label */
    .device-label {
      margin-top: 12px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-2);
      letter-spacing: 1px;
      text-align: center;
    }

    /* ─── Fullscreen Overlay ──────────────────────────────────── */
    #fullscreen-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg-0);
      flex-direction: column;
    }

    #fullscreen-overlay.open {
      display: flex;
    }

    #fs-header {
      display: flex;
      align-items: center;
      height: 44px;
      background: var(--bg-1);
      border-bottom: 1px solid var(--border);
      padding: 0 14px;
      gap: 8px;
      flex-shrink: 0;
    }

    .fs-title {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-1);
    }

    #fs-iframe-wrap {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow: auto;
      background: var(--bg-0);
    }

    #fs-iframe-wrap.device-mode {
      background: #080a0f;
      padding: 24px 0 16px;
    }

    #fs-iframe-desktop {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      display: block;
    }

    /* ─── Console Panel ────────────────────────────────────────── */
    #console-panel {
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      background: var(--bg-1);
      height: 160px;
      min-height: 60px;
      max-height: 60vh;
    }

    #console-header {
      display: flex;
      align-items: center;
      height: 30px;
      padding: 0 12px;
      gap: 8px;
      background: var(--bg-0);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      cursor: ns-resize;
      user-select: none;
    }

    .console-label {
      font-size: 11px;
      font-weight: 600;
      font-family: var(--font-mono);
      color: var(--text-2);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    #console-log-count {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-2);
      background: var(--bg-2);
      border-radius: 10px;
      padding: 1px 7px;
      display: none;
    }

    #console-output {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
      font-family: var(--font-mono);
      font-size: 12px;
    }

    .console-line {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 3px 12px;
      line-height: 1.5;
      animation: fadeIn .12s;
    }

    .console-line:hover {
      background: var(--bg-2);
    }

    .console-line .cl-icon {
      font-size: 10px;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .console-line .cl-msg {
      color: var(--text-0);
      word-break: break-all;
      white-space: pre-wrap;
    }

    .console-line .cl-time {
      margin-left: auto;
      color: var(--text-2);
      font-size: 10px;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .console-line.log .cl-icon {
      color: var(--text-2);
    }

    .console-line.warn .cl-icon,
    .console-line.warn .cl-msg {
      color: var(--warn);
    }

    .console-line.error .cl-icon,
    .console-line.error .cl-msg {
      color: var(--err);
    }

    .console-line.info .cl-icon {
      color: var(--tab-css);
    }

    .console-empty {
      text-align: center;
      color: var(--text-2);
      font-size: 11px;
      padding: 18px;
      font-family: var(--font-mono);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-2px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    /* ─── Resize handle ────────────────────────────────────────── */
    #resize-handle {
      width: 5px;
      background: transparent;
      cursor: col-resize;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      transition: background .15s;
      position: relative;
      z-index: 5;
    }

    #resize-handle:hover,
    #resize-handle.dragging {
      background: var(--accent-dim);
      border-color: var(--accent);
    }

    /* ─── Copy-All Modal ──────────────────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 8000;
      background: rgba(0, 0, 0, .75);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
    }

    #modal-overlay.open {
      display: flex;
    }

    #modal-box {
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: min(680px, 96vw);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 80px rgba(0, 0, 0, .5);
      animation: modalIn .18s ease;
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(.95) translateY(8px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    #modal-header {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }

    #modal-header h3 {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-0);
      flex: 1;
    }

    #modal-code {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }

    #modal-code pre {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-0);
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.6;
      background: var(--bg-0);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      max-height: 380px;
      overflow-y: auto;
    }

    #modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
    }

    /* ─── Responsive ───────────────────────────────────────────── */
    @media (max-width: 700px) {
      #app {
        flex-direction: column;
      }

      #editor-panel {
        width: 100% !important;
        height: 50%;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      #resize-handle {
        display: none;
      }

      #preview-panel {
        height: 50%;
      }

      .device-shell.phone {
        width: 100%;
        border-radius: 0;
        box-shadow: none;
      }

      .device-shell.tablet {
        width: 100%;
        border-radius: 0;
        box-shadow: none;
      }
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-1);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bg-3);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #3a4560;
    }
  </style>
</head>

<body>

  <!-- ─── Header ──────────────────────────────────────────────── -->
  <header id="header">
    <div class="logo">EdTechra <span>QuickRun</span></div>
    <div class="hdr-sep"></div>

    <button class="btn primary" id="btn-run" title="Run code (Ctrl+Enter)">
      <svg viewBox="0 0 13 13" fill="currentColor">
        <path d="M3 2l8 4.5L3 11z" />
      </svg>
      Run ▶
    </button>

    <button class="btn" id="btn-autorun" title="Toggle auto-run on change">
      <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M6.5 1a5.5 5.5 0 1 1-3.9 9.4" />
        <path d="M1 5V1.5M1 1.5H4.5" />
      </svg>
      Auto-Run
    </button>

    <button class="btn" id="btn-reset" title="Reset to starter template">
      <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M2 6.5a4.5 4.5 0 1 1 .9 2.7" />
        <path d="M2 10V7h3" />
      </svg>
      Reset
    </button>

    <button class="btn" id="btn-download" title="Download as HTML file">
      <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M6.5 1v8M3.5 6.5l3 3 3-3M1 11h11" />
      </svg>
      Download
    </button>

    <div class="hdr-sep"></div>

    <!-- NEW: Library & Template Buttons -->
    <button class="btn" id="btn-libraries" title="Add CSS/JS libraries (Tailwind, Lucide, etc.)">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M1 4l6-3 6 3-6 3-6-3zM1 7.5l6 3 6-3M1 10.5l6 3 6-3" />
      </svg>
      Libraries
    </button>

    <button class="btn" id="btn-templates" title="Load starter templates">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="2" width="10" height="10" rx="2" />
        <path d="M2 6h10M6 2v10" />
      </svg>
      Templates
    </button>

    <button class="btn" id="btn-format" title="Format Code (Indent)">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M2 4h10M4 7h8M2 10h10" />
      </svg>
      Format
    </button>

    <div class="hdr-sep"></div>

    <button class="btn" id="btn-copy" title="Copy current tab code">
      <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <rect x="4.5" y="4.5" width="7" height="8" rx="1.2" />
        <path d="M9 4.5V2.5a1 1 0 0 0-1-1h-6a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h2" />
      </svg>
      Copy Tab
    </button>

    <!-- NEW: Copy combined HTML+CSS+JS as single file -->
    <button class="btn" id="btn-copy-all" title="View & copy all as one HTML file">
      <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <rect x="3" y="3" width="9" height="9" rx="1.2" />
        <path d="M1 9V1.5A.5.5 0 0 1 1.5 1H9" />
      </svg>
      Copy All
    </button>

    <div class="hdr-sep"></div>

    <!-- NEW: Fullscreen preview -->
    <button class="btn" id="btn-fullscreen" title="Fullscreen preview (F11)">
      <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M1 4.5V1h3.5M8.5 1H12v3.5M12 8.5V12H8.5M4.5 12H1V8.5" />
      </svg>
      Fullscreen
    </button>

    <span id="status">Ready</span>
  </header>

  <!-- ─── App Body ─────────────────────────────────────────────── -->
  <div id="app">

    <!-- ─── Left: Editor Panel ────────────────────────────────── -->
    <div id="editor-panel">
      <div id="tab-bar">
        <div class="tab active" data-lang="html"><span class="dot"></span>HTML</div>
        <div class="tab" data-lang="css"><span class="dot"></span>CSS</div>
        <div class="tab" data-lang="js"><span class="dot"></span>JS</div>
        <div class="tab-actions">
          <button class="btn" id="btn-copy-tabbar" style="font-size:11px;padding:0 8px;height:26px;"
            title="Copy current tab">
            <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <rect x="4.5" y="4.5" width="7" height="8" rx="1.2" />
              <path d="M9 4.5V2.5a1 1 0 0 0-1-1h-6a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h2" />
            </svg>
            Copy
          </button>
        </div>
      </div>
      <div id="editor-container"></div>
    </div>

    <!-- ─── Resize Handle ─────────────────────────────────────── -->
    <div id="resize-handle" title="Drag to resize panels"></div>

    <!-- ─── Right: Preview Panel ──────────────────────────────── -->
    <div id="preview-panel">
      <div id="preview-header">
        <span class="preview-label">Preview</span>

        <!-- NEW: PC / Tablet / Mobile viewport toggle -->
        <div class="vp-group" id="vp-group-main">
          <div class="vp-btn active" data-vp="desktop" title="Desktop / PC view">
            <svg viewBox="0 0 18 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <rect x="1" y="1" width="16" height="10" rx="1.5" />

    // ═══════════════════════════════════════════════════════════════

    // ── Starter Template ──────────────────────────────────────────
    const STARTER = {

      css: `* { box-sizing: border-box; margin: 0; padding: 0; }

    const state = {

    // ── Templates Config ──────────────────────────────────────────
    const TEMPLATES = [
      {

gsap.to("#sub", { opacity: 1, y: -10, duration: 1, delay: 0.3, ease: "slow" });

      },
      {
        id: 'glass', name: 'Glass Card UI',
        desc: 'Futuristic glassmorphism card component',
        libraries: ['tailwind'],
        html: `<div class="min-h-screen bg-[url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=2000')] bg-cover bg-center flex items-center justify-center p-6">
  <div class="backdrop-blur-xl bg-white/10 border border-white/20 rounded-3xl p-8 max-w-sm w-full shadow-2xl">
    <div class="w-16 h-16 bg-gradient-to-tr from-purple-500 to-pink-500 rounded-2xl mb-6 flex items-center justify-center text-3xl">✨</div>

    <p class="text-white/60 mb-6">A modern UI trend using translucent backgrounds with a frosted glass look.</p>
    <button class="w-full py-3 bg-white/20 hover:bg-white/30 border border-white/30 rounded-xl text-white font-semibold transition-colors">
      Learn More
    </button>
  </div>
</div>`
      }
    ];

    // ── DOM Refs ──────────────────────────────────────────────────
    const iframeDesktop = document.getElementById('preview-iframe-desktop');
    const iframeDevice = document.getElementById('preview-iframe-device');
    const deviceFrame = document.getElementById('iframe-device-frame');
    const deviceShell = document.getElementById('device-shell');
    const deviceLabel = document.getElementById('device-label');
    const previewWrap = document.getElementById('preview-wrap');
    const consoleOut = document.getElementById('console-output');
    const logCountEl = document.getElementById('console-log-count');
    const statusEl = document.getElementById('status');
    const fsOverlay = document.getElementById('fullscreen-overlay');
    const fsIframeDesktop = document.getElementById('fs-iframe-desktop');
    const fsIframeDevice = document.getElementById('fs-iframe-device');
    const fsDeviceWrap = document.getElementById('fs-device-wrap');
    const fsDeviceShell = document.getElementById('fs-device-shell');
    const fsDeviceLabel = document.getElementById('fs-device-label');
    const fsIframeWrap = document.getElementById('fs-iframe-wrap');
    const modalOverlay = document.getElementById('modal-overlay');
    const modalPre = document.getElementById('modal-pre');

    // ── Monaco Setup ──────────────────────────────────────────────
    let editors = {}, activeEditor = null, debounceTimer = null;

    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });

    require(['vs/editor/editor.main'], () => {
      loadCode();

      // Custom theme with rich token colours
      monaco.editor.defineTheme('quickrun-dark', {
        base: 'vs-dark', inherit: true,
        rules: [
          { token: 'keyword', foreground: 'c792ea', fontStyle: 'italic' },
          { token: 'string', foreground: 'c3e88d' },
          { token: 'comment', foreground: '546e7a', fontStyle: 'italic' },
          { token: 'number', foreground: 'f78c6c' },
          { token: 'tag', foreground: 'f07178' },
          { token: 'attribute.name', foreground: 'ffcb6b' },
          { token: 'attribute.value', foreground: 'c3e88d' },
          { token: 'delimiter', foreground: '89ddff' },
          { token: 'type', foreground: 'ffcb6b' },
          { token: 'variable', foreground: 'eeffff' },
          { token: 'function', foreground: '82aaff' },
          { token: 'regexp', foreground: 'f07178' },
          { token: 'operator', foreground: '89ddff' },
        ],
        colors: {
          'editor.background': '#13161e',
          'editor.foreground': '#eeffff',
          'editor.lineHighlightBackground': '#1a1e2870',
          'editor.selectionBackground': '#2a3a5060',
          'editorCursor.foreground': '#4af0a8',
          'editorLineNumber.foreground': '#3a4560',
          'editorLineNumber.activeForeground': '#8b93a8',
          'editorBracketMatch.background': '#1a3a3a50',
          'editorBracketMatch.border': '#4af0a840',
          'editorSuggestWidget.background': '#1a1e28',
          'editorSuggestWidget.border': '#2a3045',
          'editorSuggestWidget.foreground': '#e8ecf5',
          'editorSuggestWidget.selectedBackground': '#2a3a50',
          'editorHoverWidget.background': '#1a1e28',
          'editorHoverWidget.border': '#2a3045',
          'editorIndentGuide.background': '#1f2436',
        }
      });
      monaco.editor.setTheme('quickrun-dark');

      const langMap = { html: 'html', css: 'css', js: 'javascript' };
      const ec = document.getElementById('editor-container');

      Object.entries(langMap).forEach(([tab, lang]) => {
        const wrap = document.createElement('div');
        wrap.style.cssText = `position:absolute;top:0;left:0;right:0;bottom:0;display:${tab === 'html' ? 'block' : 'none'}`;
        wrap.id = `editor-wrap-${tab}`;
        ec.appendChild(wrap);

        const editor = monaco.editor.create(wrap, {
          value: state.code[tab],
          language: lang,
          theme: 'quickrun-dark',
          fontSize: 14,
          fontFamily: "'JetBrains Mono', monospace",
          fontLigatures: true,
          minimap: { enabled: false },
          lineNumbers: 'on',
          scrollBeyondLastLine: false,
          automaticLayout: true,
          wordWrap: 'on',
          padding: { top: 10, bottom: 10 },
          renderLineHighlight: 'gutter',
          smoothScrolling: true,
          cursorBlinking: 'smooth',
          tabSize: 2,
          contextmenu: true,
          // ── Sublime-style autocomplete settings ─────────────────
          quickSuggestions: { other: true, comments: false, strings: true },
          suggestOnTriggerCharacters: true,
          acceptSuggestionOnEnter: 'on',
          tabCompletion: 'on',
          wordBasedSuggestions: true,
          parameterHints: { enabled: true },
          snippetSuggestions: 'top',        // snippets float to top like Sublime
          suggest: {
            showKeywords: true, showSnippets: true, showClasses: true,
            showFunctions: true, showVariables: true, showProperties: true,
            showMethods: true, insertMode: 'replace', filterGraceful: true,
            localityBonus: true,            // prefer tokens near cursor
            showStatusBar: true,
          },
          autoClosingBrackets: 'languageDefined',
          autoClosingQuotes: 'languageDefined',
          autoSurround: 'languageDefined',
          bracketPairColorization: { enabled: true },
          formatOnType: true,
          formatOnPaste: true,
          hover: { enabled: true },
          colorDecorators: true,            // CSS colour swatches inline
        });

        editor.onDidChangeModelContent(() => {
          state.code[tab] = editor.getValue();
          saveCode();
          if (state.autoRun) {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(runCode, 500);
          }
        });

        editors[tab] = editor;
      });

      // ── Register snippet completion providers ────────────────
      // These provide Sublime-style trigger-word snippets on top of
      // Monaco's built-in IntelliSense.

      monaco.languages.registerCompletionItemProvider('html', {
        provideCompletionItems(model, pos) {
          const w = model.getWordUntilPosition(pos);
          const r = { startLineNumber: pos.lineNumber, endLineNumber: pos.lineNumber, startColumn: w.startColumn, endColumn: w.endColumn };
          return { suggestions: htmlSnippets(r) };
        }
      });

      monaco.languages.registerCompletionItemProvider('css', {
        provideCompletionItems(model, pos) {
          const w = model.getWordUntilPosition(pos);
          const r = { startLineNumber: pos.lineNumber, endLineNumber: pos.lineNumber, startColumn: w.startColumn, endColumn: w.endColumn };

      });

      monaco.languages.registerCompletionItemProvider('javascript', {
        provideCompletionItems(model, pos) {
          const w = model.getWordUntilPosition(pos);
          const r = { startLineNumber: pos.lineNumber, endLineNumber: pos.lineNumber, startColumn: w.startColumn, endColumn: w.endColumn };
          return { suggestions: jsSnippets(r) };
        }
      });

      runCode();

    // ── Snippet helpers ───────────────────────────────────────────
    function snip(label, body, detail, range) {
      return {
        label, kind: monaco.languages.CompletionItemKind.Snippet,
        insertText: body,
        insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
        detail: `⚡ ${detail}`, range, sortText: '0' + label,

    function htmlSnippets(r) {
      return [
        snip('!', '<!DOCTYPE html>\n<html lang="en">\n<head>\n\t<meta charset="UTF-8">\n\t<meta name="viewport" content="width=device-width, initial-scale=1.0">\n\t<title>${1:Document}</title>\n</head>\n<body>\n\t${2}\n</body>\n</html>', 'HTML5 Boilerplate', r),
        snip('div', '<div class="${1:container}">\n\t${2}\n</div>', 'div block', r),

    // ── Build srcdoc with postMessage console bridge ─────────────
    function buildSrcdoc(code) {
      // Bridge injected first to intercept console calls
      const bridge = `<script>(function(){
  const m = (t,a) => window.parent.postMessage({__qr:true,type:t,msg:Array.from(a).map(x=>{try{return typeof x==='object'?JSON.stringify(x,null,2):String(x)}catch(e){return String(x)}}).join(' ')},'*');
  ['log','warn','error','info'].forEach(t=>{const o=console[t].bind(console);console[t]=(...a)=>{o(...a);m(t,a);};});
  window.onerror=(msg,s,l,c)=>{window.parent.postMessage({__qr:true,type:'error',msg:msg+' (line '+l+':'+c+')'},'*');return false;};
  window.onunhandledrejection=e=>window.parent.postMessage({__qr:true,type:'error',msg:'Unhandled Promise: '+e.reason},'*');
})();<\/script>`;

      // Build libs injection
      const cssLibs = state.libraries.filter(l => l.type === 'css').map(l => `<link rel="stylesheet" href="${l.url}">`).join('\n');
      const jsLibs = state.libraries.filter(l => l.type === 'js').map(l => `<script src="${l.url}"><\/script>`).join('\n');

      // Escape closing script tags in user code to prevent prematurely ending the container block.
      // We use a safe replacement like <\/script>
      const safeJs = code.js.replace(/<\/script>/gi, '<\\/script>');

      return `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  ${bridge}
  ${cssLibs}
  <style>${code.css}</style>
</head>
<body>
  ${code.html}
  ${jsLibs}
  <script>
    try {
      ${safeJs}
    } catch(e) {
      window.parent.postMessage({__qr:true,type:'error',msg:e.message+'\\n'+(e.stack||'')},'*');
    }
  <\/script>
</body>
</html>`;
    }

    // ── Build combined single-file HTML (for export/copy) ─────────
    function buildCombined(code) {
      return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EdTechra QuickRun Export</title>
<style>
${code.css}
</style>
</head>
<body>
${code.html}
<script>
${code.js}
<\/script>
</body>
</html>`;
    }

    // ── Sync editors → state.code ─────────────────────────────────
    function syncCode() {
      Object.keys(editors).forEach(l => { if (editors[l]) state.code[l] = editors[l].getValue(); });
    }

    // ── Run Code ──────────────────────────────────────────────────
    function runCode() {
      setStatus('running');
      syncCode();
      const doc = buildSrcdoc(state.code);

      // Push srcdoc to whichever iframe is active
      if (state.viewport === 'desktop') {
        iframeDesktop.srcdoc = doc;
      } else {
        iframeDevice.srcdoc = doc;
      }

      // If fullscreen is open, update it too
      if (fsOverlay.classList.contains('open')) {
        if (state.fsViewport === 'desktop') fsIframeDesktop.srcdoc = doc;
        else fsIframeDevice.srcdoc = doc;
      }

      setTimeout(() => setStatus('ok'), 300);
    }

    // ── postMessage listener — receives console output from iframe ─
    window.addEventListener('message', e => {
      if (!e.data?.__qr) return;
      appendConsole(e.data.type, e.data.msg);
      if (e.data.type === 'error') setStatus('error');
    });

    // ── Viewport / Device Preview Toggle ─────────────────────────
    const DEVICE_INFO = {
      mobile: { cls: 'phone', ifrH: '780px', label: 'iPhone 14 Pro — 390px' },
      tablet: { cls: 'tablet', ifrH: '600px', label: 'iPad — 768px' },
    };

    document.querySelectorAll('.vp-btn[data-vp]').forEach(btn => {
      btn.addEventListener('click', () => setViewport(btn.dataset.vp));
    });

    function setViewport(vp) {
      state.viewport = vp;
      document.querySelectorAll('.vp-btn[data-vp]').forEach(b => b.classList.toggle('active', b.dataset.vp === vp));

      if (vp === 'desktop') {
        previewWrap.classList.remove('device-mode');
        iframeDesktop.style.display = 'block';
        deviceFrame.style.display = 'none';
      } else {
        const info = DEVICE_INFO[vp];
        previewWrap.classList.add('device-mode');
        iframeDesktop.style.display = 'none';
        deviceFrame.style.display = 'flex';
        deviceShell.className = `device-shell ${info.cls}`;
        iframeDevice.style.height = info.ifrH;
        deviceLabel.textContent = info.label;
      }
      runCode();
    }

    // ── Fullscreen Preview ────────────────────────────────────────
    function openFullscreen() {
      syncCode();
      // Mirror current viewport inside fullscreen
      state.fsViewport = state.viewport;
      document.querySelectorAll('.vp-btn[data-fsvp]').forEach(b => b.classList.toggle('active', b.dataset.fsvp === state.fsViewport));
      fsOverlay.classList.add('open');
      applyFsViewport(state.fsViewport, buildSrcdoc(state.code));
      setStatus('ok');
    }

    function applyFsViewport(vp, doc) {
      if (vp === 'desktop') {
        fsIframeWrap.classList.remove('device-mode');
        fsIframeDesktop.style.display = 'block';
        fsDeviceWrap.style.display = 'none';
        if (doc) fsIframeDesktop.srcdoc = doc;
      } else {
        const info = DEVICE_INFO[vp];
        fsIframeWrap.classList.add('device-mode');
        fsIframeDesktop.style.display = 'none';
        fsDeviceWrap.style.display = 'flex';
        fsDeviceShell.className = `device-shell ${info.cls}`;
        fsIframeDevice.style.height = info.ifrH;
        fsDeviceLabel.textContent = info.label;
        if (doc) fsIframeDevice.srcdoc = doc;
      }
    }

    document.getElementById('btn-fullscreen').addEventListener('click', openFullscreen);
    document.getElementById('btn-fs-preview').addEventListener('click', openFullscreen);

    document.getElementById('btn-close-fullscreen').addEventListener('click', () => {
      fsOverlay.classList.remove('open');
      fsIframeDesktop.srcdoc = '';
      fsIframeDevice.srcdoc = '';
    });

    document.querySelectorAll('.vp-btn[data-fsvp]').forEach(btn => {
      btn.addEventListener('click', () => {
        const vp = btn.dataset.fsvp;
        state.fsViewport = vp;
        document.querySelectorAll('.vp-btn[data-fsvp]').forEach(b => b.classList.toggle('active', b.dataset.fsvp === vp));
        applyFsViewport(vp, buildSrcdoc(state.code));
      });
    });

    // ── Tab Switching ─────────────────────────────────────────────
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const lang = tab.dataset.lang;
        if (lang === state.currentTab) return;
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.lang === lang));
        ['html', 'css', 'js'].forEach(l => {
          const w = document.getElementById(`editor-wrap-${l}`);
          if (w) w.style.display = l === lang ? 'block' : 'none';
        });
        state.currentTab = lang;
        activeEditor = editors[lang];
        activeEditor?.focus();
      });
    });

    // ── Run Button ────────────────────────────────────────────────
    document.getElementById('btn-run').addEventListener('click', () => { clearConsole(); runCode(); });

    // ── Auto-Run ──────────────────────────────────────────────────
    document.getElementById('btn-autorun').addEventListener('click', function () {
      state.autoRun = !state.autoRun;
      this.classList.toggle('active', state.autoRun);
    });

    // ── Reset ─────────────────────────────────────────────────────
    document.getElementById('btn-reset').addEventListener('click', () => {
      if (!confirm('Reset all code to the starter template?')) return;
      state.code = { ...STARTER };
      Object.keys(editors).forEach(l => editors[l]?.setValue(state.code[l]));
      saveCode(); clearConsole(); runCode();
    });

    // ── Download HTML ─────────────────────────────────────────────
    document.getElementById('btn-download').addEventListener('click', () => {
      syncCode();
      const blob = new Blob([buildCombined(state.code)], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'quickrun-export.html'; a.click();
      URL.revokeObjectURL(url);
    });

    // ── Copy current tab ──────────────────────────────────────────
    async function copyTab(btn) {
      const code = editors[state.currentTab]?.getValue() || '';
      try {
        await navigator.clipboard.writeText(code);
        const orig = btn.innerHTML;
        btn.innerHTML = `<svg viewBox="0 0 13 13" fill="currentColor"><path d="M2 7l4 4 5-6"/></svg> Copied!`;
        setTimeout(() => btn.innerHTML = orig, 1600);
      } catch { alert('Copy failed — please copy manually.'); }
    }
    document.getElementById('btn-copy').addEventListener('click', () => copyTab(document.getElementById('btn-copy')));
    document.getElementById('btn-copy-tabbar').addEventListener('click', () => copyTab(document.getElementById('btn-copy-tabbar')));

    // ── Library Modal Logic ──────────────────────────────────────
    function renderLibs() {
      const container = document.getElementById('lib-list');
      container.innerHTML = LIBRARIES.map(lib => `
    <div class="lib-item ${state.libraries.find(l => l.id === lib.id) ? 'active' : ''}" onclick="toggleLib('${lib.id}')">
      <div class="check">${state.libraries.find(l => l.id === lib.id) ? '✓' : ''}</div>
      <div style="font-size:12px; font-weight:600;">${lib.name}</div>
    </div>
  `).join('');
    }

    window.toggleLib = (id) => {
      const lib = LIBRARIES.find(l => l.id === id);
      const idx = state.libraries.findIndex(l => l.id === id);
      if (idx > -1) state.libraries.splice(idx, 1);
      else state.libraries.push(lib);
      renderLibs();
      runCode();
      saveCode();
    };

    document.getElementById('btn-libraries').addEventListener('click', () => {
      renderLibs();
      document.getElementById('libraries-modal').classList.add('open');
    });

    // ── Template Modal Logic ─────────────────────────────────────
    function renderTemplates() {
      const container = document.getElementById('template-list');
      container.innerHTML = TEMPLATES.map(tpl => `
    <div class="tpl-item" onclick="applyTemplate('${tpl.id}')">
      <h4>${tpl.name}</h4>
      <p>${tpl.desc}</p>
    </div>
  `).join('');
    }

    window.applyTemplate = (id) => {
      const tpl = TEMPLATES.find(t => t.id === id);
      if (!tpl) return;
      if (!confirm('This will replace your current code. Continue?')) return;

      state.code = {
        html: tpl.html || '',
        css: tpl.css || '',
        js: tpl.js || ''
      };

      // Set libraries
      state.libraries = tpl.libraries ? LIBRARIES.filter(l => tpl.libraries.includes(l.id)) : [];

      Object.keys(editors).forEach(l => editors[l]?.setValue(state.code[l]));
      document.getElementById('templates-modal').classList.remove('open');
      runCode();
      saveCode();
    };

    document.getElementById('btn-templates').addEventListener('click', () => {
      renderTemplates();
      document.getElementById('templates-modal').classList.add('open');
    });

    // ── Close Modals ──────────────────────────────────────────────
    document.querySelectorAll('.close-modal').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open'));
      });
    });

    window.addEventListener('click', e => {
      if (e.target.classList.contains('modal-overlay')) {
        e.target.classList.remove('open');
      }
    });

    // ── Format Code ───────────────────────────────────────────────
    document.getElementById('btn-format').addEventListener('click', () => {
      const editor = editors[state.currentTab];
      if (editor) {
        editor.getAction('editor.action.formatDocument').run();
        setStatus('ok');
      }
    });

    // ── Copy All — shows modal with combined HTML ─────────────────
    document.getElementById('btn-copy-all').addEventListener('click', () => {
      syncCode();
      modalPre.textContent = buildCombined(state.code);
      document.getElementById('modal-overlay').classList.add('open');
    });

    document.getElementById('modal-copy-btn').addEventListener('click', async function () {
      try {
        await navigator.clipboard.writeText(modalPre.textContent);
        const orig = this.innerHTML;
        this.innerHTML = `<svg viewBox="0 0 13 13" fill="currentColor"><path d="M2 7l4 4 5-6"/></svg> Copied!`;
        setTimeout(() => this.innerHTML = orig, 2000);
      } catch { alert('Copy failed — please select all text and copy manually.'); }
    });

    // ── Console ───────────────────────────────────────────────────
    function appendConsole(type, msg) {
      const empty = consoleOut.querySelector('.console-empty');
      if (empty) empty.remove();
      state.logCount++;
      logCountEl.style.display = 'inline';
      logCountEl.textContent = state.logCount;
      const icons = { log: '›', warn: '⚠', error: '✖', info: 'ℹ' };
      const now = new Date();
      const time = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
      const line = document.createElement('div');
      line.className = `console-line ${type}`;
      line.innerHTML = `<span class="cl-icon">${icons[type] || '›'}</span><span class="cl-msg">${escapeHtml(msg)}</span><span class="cl-time">${time}</span>`;
      consoleOut.appendChild(line);
      consoleOut.scrollTop = consoleOut.scrollHeight;
    }

    function escapeHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function setStatus(s) { statusEl.className = s; statusEl.textContent = { running: 'Running…', error: 'Error', ok: 'OK' }[s] || 'Ready'; }

    document.getElementById('btn-clear-console').addEventListener('click', clearConsole);
    function clearConsole() {
      consoleOut.innerHTML = '<div class="console-empty">No output yet. Run your code!</div>';
      state.logCount = 0; logCountEl.style.display = 'none';
    }

    // ── localStorage Persistence ──────────────────────────────────
    function saveCode() {
      try { localStorage.setItem('qr-html', state.code.html); localStorage.setItem('qr-css', state.code.css); localStorage.setItem('qr-js', state.code.js); } catch (e) { }
    }
    function loadCode() {
      try {
        const h = localStorage.getItem('qr-html'), c = localStorage.getItem('qr-css'), j = localStorage.getItem('qr-js');
        state.code.html = h !== null ? h : STARTER.html;
        state.code.css = c !== null ? c : STARTER.css;
        state.code.js = j !== null ? j : STARTER.js;
      } catch (e) { state.code = { ...STARTER }; }
    }

    // ── Keyboard Shortcuts ────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); clearConsole(); runCode(); }
      if (e.key === 'Escape' && fsOverlay.classList.contains('open')) {
        fsOverlay.classList.remove('open'); fsIframeDesktop.srcdoc = ''; fsIframeDevice.srcdoc = '';
      }
      if (e.key === 'F11' && !e.target.closest('iframe')) { e.preventDefault(); openFullscreen(); }
    });

    // ── Panel Resize (left/right) ─────────────────────────────────
    const resizeHandle = document.getElementById('resize-handle');
    const editorPanel = document.getElementById('editor-panel');
    let isResizing = false;

    resizeHandle.addEventListener('mousedown', () => {
      isResizing = true; resizeHandle.classList.add('dragging');
      document.body.style.cursor = 'col-resize'; document.body.style.userSelect = 'none';
    });
    document.addEventListener('mousemove', e => {
      if (!isResizing) return;
      const r = document.getElementById('app').getBoundingClientRect();
      editorPanel.style.width = Math.max(220, Math.min(e.clientX - r.left, r.width - 200)) + 'px';
    });
    document.addEventListener('mouseup', () => {
      if (!isResizing) return;
      isResizing = false; resizeHandle.classList.remove('dragging');
      document.body.style.cursor = ''; document.body.style.userSelect = '';
      Object.values(editors).forEach(e => e?.layout());
    });

    // ── Console Resize (drag top of console panel) ────────────────
    const consolePanel = document.getElementById('console-panel');
    const consoleHeader = document.getElementById('console-header');
    let isResizingCon = false, conStartY = 0, conStartH = 0;

    consoleHeader.addEventListener('mousedown', e => {
      isResizingCon = true; conStartY = e.clientY; conStartH = consolePanel.offsetHeight;
      document.body.style.cursor = 'ns-resize'; document.body.style.userSelect = 'none';
    });
    document.addEventListener('mousemove', e => {
      if (!isResizingCon) return;
      const newH = Math.max(60, Math.min(conStartH + (conStartY - e.clientY), window.innerHeight * .6));
      consolePanel.style.height = newH + 'px';
    });
    document.addEventListener('mouseup', () => {
      if (!isResizingCon) return;
      isResizingCon = false; document.body.style.cursor = ''; document.body.style.userSelect = '';
    });
  </script>
</body>
